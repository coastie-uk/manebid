<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operator Login | ManeBid — Convention Auction Manager</title>
  <link rel="stylesheet" href="/styles/admin-styles.css">
  <link rel="icon" type="image/png" href="/images/favicon.png" />
</head>
<body>
  <main>
    <section class="login-container" style="max-width: 980px; margin: 32px auto;">
      <div class="brand-lockup">
        <h1 class="app-wordmark">ManeBid</h1>
        <p class="app-tagline">Convention Auction Manager</p>
      </div>
      <p id="login-message" class="panel-subtle" style="margin-bottom: 20px;">
        Sign in once, then open the views allowed for your account.
      </p>

      <div style="display: grid; gap: 24px; grid-template-columns: minmax(280px, 340px); justify-content: center;">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>Sign In</h2>
              <div class="panel-subtle">Shared operator session</div>
            </div>
          </div>
          <div class="panel-body" style="display: grid; gap: 12px;">
            <input type="text" id="login-username" placeholder="Username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button id="login-button" type="button">Login</button>
            <p id="login-error" class="error-message" style="min-height: 1.2em; margin: 0;"></p>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="/scripts/banner.js"></script>
  <script src="/scripts/session-auth.js?v=2026-07-02-csrf-1"></script>
  <script src="/scripts/login.js"></script>
</body>
</html>
