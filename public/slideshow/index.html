<!DOCTYPE html>
<html lang="en" data-view-key="slideshow" data-access-role="slideshow" data-allow-kiosk="true">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow | ManeBid — Convention Auction Manager</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: black;
            font-family: sans-serif;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #slide-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #overlay-text {
            position: absolute;
            bottom: 5%;
            left: 5%;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1.5rem;
            max-width: 90%;
        }

        #start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            padding: 1rem 2rem;
            z-index: 10;
        }

        #config-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(255,255,255,0.9);
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            z-index: 20;
        }

        #config-panel label {
            display: block;
            margin-bottom: 0.5rem;
        }

        #config-panel button {
            margin-top: 0.5rem;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <img id="slide-image" src="" alt="Auction Item">
        <div id="overlay-text"></div>
        <!-- <button id="start-button">Start Slideshow</button> -->
        <div id="config-panel">
            <p>Press [c] or touch and hold to show this panel, it will auto-hide. [space] to pause/resume</p>
            <label>Transition Time (s): <input type="number" id="transition-time" min="1" value="10"></label>
            <label><input type="checkbox" id="show-description" checked> Show Description</label>
            <label><input type="checkbox" id="show-contributor" checked> Show Contributor</label>
            <label><input type="checkbox" id="show-artist" checked> Show Creator</label>
            <label>Refresh Interval (s): <input type="number" id="refresh-interval" min="10" value="60"></label>
            <label><input type="checkbox" id="shuffle-items" checked> Shuffle Items</label>
            <button id="change-auction">Change auction</button>
            <button id="pause-button">Pause</button>
            <button id="resume-button">Resume</button>
            <button id="restart-button">Reload slideshow</button>


        </div>
    </div>
    <script src="/scripts/page-bootstrap.js"></script>
    <script src="/scripts/session-auth.js?v=2026-07-02-csrf-1"></script>
    <script src="/scripts/auth-bootstrap.js"></script>
    <script src="/scripts/slideshow.js?v=2026-07-02-csrf-1"></script>



</body>
</html>
