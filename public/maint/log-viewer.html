<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Logs | ManeBid — Convention Auction Manager</title>
  <link rel="stylesheet" href="/styles/admin-styles.css">
  <link rel="stylesheet" href="/styles/maintenance.css">
  <link rel="stylesheet" href="/styles/log-viewer.css">
</head>
<body>
  <main class="log-viewer-shell">
    <header class="log-viewer-head">
      <div>
        <h1>Server Logs</h1>
        <p>Monitoring window linked to the Manage Auctions panel.</p>
      </div>
      <div class="log-viewer-actions">
        <label><input id="popup-auto-refresh" type="checkbox"> Auto-refresh</label>
        <button id="popup-refresh-logs" type="button">Refresh</button>
        <button id="popup-close-window" type="button">Close</button>
      </div>
    </header>
    <div id="popup-server-logs">Loading logs...</div>
  </main>
  <script src="/scripts/log-viewer.js"></script>
</body>
</html>
