<IfModule mod_headers.c>
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(self), microphone=(), geolocation=()"
</IfModule>

# Defaults match BACKUP_UPLOAD_MAX_BYTES plus 1 MiB multipart overhead.
<Location "/api/maintenance/backups/import/inspect">
    LimitRequestBody 537919488
</Location>

# Defaults match 20 x 10 MiB resource images plus 1 MiB multipart overhead.
<Location "/api/maintenance/resources/upload">
    LimitRequestBody 210763776
</Location>
